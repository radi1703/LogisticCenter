<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оператор - Меню</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/site.css">
    <style>
        body {
            background-color: #89CFF0; 
        }
        
        
        .operator-card {
            background: white;
            border: 3px solid black;
            border-radius: 15px;
            padding: 30px 20px;
            box-shadow: 6px 6px 0px black;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            height: 100%;
        }
        
        
        .operator-card:hover {
            transform: translateY(-5px);
            box-shadow: 8px 8px 0px black;
            background-color: #f8f9fa;
        }

        .icon-large {
            font-size: 4rem;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="custom-header d-flex justify-content-between align-items-center px-4" style="background-color: #ffc0cb; border-bottom: 3px solid black; padding: 15px 0;">
        <div class="fw-bold fs-4">
            <i class="fas fa-shipping-fast me-2"></i> Logistic Center
        </div>
        <div class="fs-5">
            <span class="me-4 fw-bold"><i class="fas fa-user-circle"></i> Здравей, <span id="operatorNameDisplay">Оператор</span></span>
            <a href="#" class="text-dark fw-bold text-decoration-underline" onclick="logout()">ИЗХОД</a>
        </div>
    </div>

    <div class="container mt-5 mb-5">
        
        <div class="text-center mb-5">
            <h1 class="fw-bold text-dark text-uppercase" style="text-shadow: 2px 2px 0px white;">РАБОТНО ТАБЛО</h1>
            <p class="fs-4 fw-bold text-dark mt-2" id="currentDate">---</p>
        </div>
        
        <div class="row g-4 justify-content-center">
            
            <div class="col-md-4 col-sm-10">
                <div class="operator-card" onclick="window.location.href='operator-register.html'">
                    <i class="fas fa-box-open icon-large text-primary"></i>
                    <h4 class="fw-bold">Регистриране на пратка</h4>
                    <p class="text-muted fw-bold mt-2 mb-0">Създай нова товарителница и разпредели към куриер</p>
                </div>
            </div>

            <div class="col-md-4 col-sm-10">
                <div class="operator-card" onclick="window.location.href='operator-management.html'">
                    <i class="fas fa-search-location icon-large text-success"></i>
                    <h4 class="fw-bold">Управление на пратки</h4>
                    <p class="text-muted fw-bold mt-2 mb-0">Търсене, промяна на статуси и докладване на проблеми</p>
                </div>
            </div>

            <div class="col-md-4 col-sm-10">
                <div class="operator-card" onclick="window.location.href='operator-warehouse-menu.html'">
                    <i class="fas fa-warehouse icon-large text-warning"></i>
                    <h4 class="fw-bold">Складови наличности</h4>
                    <p class="text-muted fw-bold mt-2 mb-0">Завеждане на пратки и преглед на наличностите в складовете</p>
                </div>
            </div>

        </div>

    </div>

    <div class="custom-footer" style="background-color: #ffc0cb; border-top: 3px solid black; position: fixed; bottom: 0; width: 100%; height: 40px;"></div>

    <script>
        // днешната дата
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bg-BG', options);

        // Взимаме името на логнатия оператор
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.username) {
            document.getElementById('operatorNameDisplay').innerText = user.username;
        } else {
            // Ако някой се опита да отвори страницата без да се е логнал, го връщаме в началото
            window.location.href = 'index.html'; 
        }

        // Функция за Изход
        function logout() { 
            // Изтриваме данните от паметта на браузъра
            localStorage.removeItem('user'); 
            // Пренасочваме към началната страница с логина
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
