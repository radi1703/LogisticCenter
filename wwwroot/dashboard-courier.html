<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Куриер - Табло</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/site.css">
    <style>
        .dashboard-btn {
            padding: 30px; font-size: 1.5rem; font-weight: bold;
            border-radius: 15px; border: 2px solid black;
            box-shadow: 6px 6px 0px black; transition: transform 0.2s;
            text-transform: uppercase;
        }
        .dashboard-btn:hover { transform: translate(-2px, -2px); box-shadow: 8px 8px 0px black; }
        .btn-schedule { background-color: #89CFF0; color: black; }
    </style>
</head>
<body>
    <div class="custom-header d-flex justify-content-between align-items-center px-4" style="background-color: #ffc0cb; border-bottom: 3px solid black; padding: 15px 0;">
        <div class="fw-bold fs-4">
            <i class="fas fa-shipping-fast me-2"></i> Logistic Center
        </div>
        <div class="fs-5">
            <span class="me-3 fw-bold"><i class="fas fa-user-circle"></i> <span id="usernameDisplay">Здравей!</span></span>
            <a href="index.html" class="text-dark fw-bold text-decoration-underline" onclick="logout()">ИЗХОД</a>
        </div>
    </div>

    <div class="container mt-5">
        <div class="text-center mb-5">
            <h1 class="fw-bold display-4">КУРИЕРСКИ ПАНЕЛ</h1>
            <p class="fs-4 text-muted">Успешна смяна!</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-md-6 mb-4">
                <a href="courier-schedule.html" class="btn btn-schedule dashboard-btn w-100">
                    <i class="fas fa-calendar-alt mb-2 d-block" style="font-size: 3rem;"></i>
                    МОЯТ ГРАФИК
                </a>
            </div>
        </div>
    </div>

    <div class="custom-footer"></div>

    <script>
        // Взимаме потребителя от паметта на браузъра
        const user = JSON.parse(localStorage.getItem('user'));

        // Ако има влязъл потребител, показваме името му
        if (user && user.username) {
            document.getElementById('usernameDisplay').innerText = `Здравей, ${user.username}!`;
        } else {
            // Ако никой не е влязъл, връщаме го на логин екрана 
            window.location.href = 'index.html';
        }

        function logout() {
            localStorage.removeItem('user'); // Изчистваме паметта
        }
    </script>
</body>
</html>
