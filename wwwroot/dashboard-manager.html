<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мениджър - Табло</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/site.css">
    <style>
        .stat-card {
            background: white;
            border: 3px solid black;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 6px 6px 0px black;
            text-align: center;
            height: 100%;
        }
        .stat-card h1 {
            font-size: 4rem;
            font-weight: bold;
            margin: 0;
        }
        .warehouse-section {
            background-color: #dbeafe; 
            border: 3px solid black;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 6px 6px 0px black;
            margin-top: 30px;
        }
        .progress-custom {
            height: 30px;
            border: 2px solid black;
            border-radius: 10px;
            background-color: white;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.1);
        }
        .progress-bar-fill {
            background-color: #198754; 
            height: 100%;
            border-radius: 8px;
            transition: width 1s ease-in-out;
        }
        .btn-report {
            background-color: #ffc107;
            border: 3px solid black;
            box-shadow: 4px 4px 0px black;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.2s;
        }
        .btn-report:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px black; }
        
        .report-section {
            display: none; 
            background: white;
            border: 3px solid black;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 6px 6px 0px black;
            margin-top: 30px;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .table-custom th { background-color: #89CFF0; border: 2px solid black; }
        .table-custom td { border: 1px solid black; vertical-align: middle; }
    </style>
</head>
<body style="background-color: #89CFF0;"> 
    <div class="custom-header d-flex justify-content-between align-items-center px-4" style="background-color: #ffc0cb; border-bottom: 3px solid black; padding: 15px 0;">
        <div class="fw-bold fs-4">
            <i class="fas fa-shipping-fast me-2"></i> Logistic Center
        </div>
        <div class="fs-5">
            <span class="me-4 fw-bold"><i class="fas fa-user-tie"></i> Здравей, <span id="managerName">Мениджър</span></span>
            <a href="index.html" class="text-dark fw-bold text-decoration-underline" onclick="logout()">ИЗХОД</a>
        </div>
    </div>

    <div class="container mt-4 mb-5">
        <h1 class="fw-bold text-center mb-1 text-uppercase">ОБЩ ПРЕГЛЕД НА СИСТЕМАТА</h1>
        <p class="text-center fw-bold mb-4 fs-5 text-muted" id="currentDate">---</p>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="stat-card">
                    <h5 class="fw-bold"><i class="fas fa-boxes"></i> ОБЩО ПРАТКИ</h5>
                    <h1 id="totalCount" style="color: #ffb6c1; text-shadow: 2px 2px 0 black;">0</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5 class="fw-bold"><i class="fas fa-check-circle"></i> ДОСТАВЕНИ</h5>
                    <h1 id="deliveredCount" style="color: #198754; text-shadow: 2px 2px 0 black;">0</h1>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <h5 class="fw-bold"><i class="fas fa-exclamation-triangle"></i> ПРОБЛЕМНИ</h5>
                    <h1 id="problemCount" style="color: #dc3545; text-shadow: 2px 2px 0 black;">0</h1>
                </div>
            </div>
        </div>

        <div class="warehouse-section text-center">
            <h4 class="fw-bold mb-4"><i class="fas fa-chart-bar text-primary"></i> Натовареност на складовете</h4>
            
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="fw-bold mb-2">Централен склад (София) - <span id="sofiaCount">0</span> пратки</label>
                    <div class="progress-custom">
                        <div id="sofiaBar" class="progress-bar-fill" style="width: 0%; background-color: #0d6efd;"></div>
                    </div>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="fw-bold mb-2">Склад Север (Варна) - <span id="varnaCount">0</span> пратки</label>
                    <div class="progress-custom">
                        <div id="varnaBar" class="progress-bar-fill" style="width: 0%; background-color: #ffc107;"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center gap-4 mt-5">
            <a href="manager-schedules.html" class="btn btn-custom px-5 py-3 fs-5" style="background-color: #ffb6c1; border: 3px solid black; box-shadow: 4px 4px 0px black; font-weight: bold;">
                <i class="fas fa-calendar-alt"></i> Графици на куриери
            </a>
            
            <button class="btn btn-report px-5 py-3 fs-5" onclick="generateReport()">
                <i class="fas fa-file-invoice"></i> Генериране на дневен отчет
            </button>
        </div>

        <div id="reportSection" class="report-section">
            <h3 class="fw-bold text-center border-bottom border-dark pb-2 mb-4">
                <i class="fas fa-clipboard-list"></i> Детайлен отчет за деня
            </h3>
            
            <div class="table-responsive">
                <table class="table table-custom table-hover text-center fw-bold">
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Създадена от</th> <th>Статус</th>
                            <th>Текуща локация</th>
                            <th>Проблем</th>
                        </tr>
                    </thead>
                    <tbody id="reportTableBody">
                    </tbody>
                </table>
            </div>
            
            <div class="text-end mt-3">
                <button class="btn btn-dark fw-bold px-4" onclick="document.getElementById('reportSection').style.display = 'none';">Затвори отчета</button>
            </div>
        </div>

    </div>

    <script>
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('bg-BG', options);

        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.username) {
            document.getElementById('managerName').innerText = user.username;
        } else {
            window.location.href = 'index.html'; 
        }

        function logout() { 
            localStorage.removeItem('user'); 
            window.location.href = 'index.html';
        }

        let reportData = [];

        window.onload = async function() {
            try {
                const response = await fetch('/api/shipments/stats');
                if (response.ok) {
                    const stats = await response.json();
                    
                    // Запазваме всички пратки и доставените и отказаните за дневния отчет
                    reportData = stats.lastShipments;

                    document.getElementById('totalCount').innerText = stats.totalShipments;
                    document.getElementById('deliveredCount').innerText = stats.deliveredCount;
                    document.getElementById('problemCount').innerText = stats.problemCount;

                    
                    // Броим колко пратки реално са в складовете без Доставени и Отказани
                    const activeSofia = reportData.filter(s => 
                        s.currentWarehouseId === 1 && s.status !== "Delivered" && s.status !== "Refused"
                    ).length;

                    const activeVarna = reportData.filter(s => 
                        s.currentWarehouseId === 2 && s.status !== "Delivered" && s.status !== "Refused"
                    ).length;

                    // Показваме новите, правилни бройки
                    document.getElementById('sofiaCount').innerText = activeSofia;
                    document.getElementById('varnaCount').innerText = activeVarna;
                    
                    // Изчисляваме процентите спрямо новите бройки (капацитета е 50)
                    let sofiaPercent = (activeSofia / 50) * 100;
                    let varnaPercent = (activeVarna / 50) * 100;
                    
                    document.getElementById('sofiaBar').style.width = (sofiaPercent > 100 ? 100 : sofiaPercent) + '%';
                    document.getElementById('varnaBar').style.width = (varnaPercent > 100 ? 100 : varnaPercent) + '%';
                    
                }
            } catch (error) {
                console.error("Грешка при зареждане на статистиката:", error);
            }
        };

        function generateReport() {
            const tbody = document.getElementById('reportTableBody');
            tbody.innerHTML = ''; 

            if (!reportData || reportData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="text-muted fst-italic py-4">Няма данни за пратки днес.</td></tr>';
            } else {
                
                
                reportData.forEach(s => {
                    
                    let displayStatus = s.status; 
                    let bgStatus = "";

                    if (s.status === "Delivered" || s.status === "Доставена") { 
                        displayStatus = "Доставена"; 
                        bgStatus = "bg-success text-white"; 
                    }
                    else if (s.status === "In Transit" || s.status === "В движение") { 
                        displayStatus = "В движение"; 
                        bgStatus = "bg-warning text-dark"; 
                    }
                    else if (s.status === "In Warehouse" || s.status === "В склад") { 
                        displayStatus = "В склад"; 
                        bgStatus = "bg-light border border-dark text-dark"; 
                    }
                    else if (s.status === "Refused" || s.status === "Отказана") { 
                        displayStatus = "Отказана"; 
                        bgStatus = "bg-danger text-white"; 
                    }
                    else if (s.status === "Registered" || s.status === "Регистрирана") {
                        displayStatus = "Регистрирана";
                        bgStatus = "bg-info text-dark";
                    }
                    else if (s.status === "Redirected" || s.status === "Пренасочена") { 
                        displayStatus = "Пренасочена"; 
                        bgStatus = "bg-primary text-white"; 
                    }

                    
                    let location = "Неразпределена";
                    if (s.status === "Delivered" || s.status === "Refused") {
                        location = `<span class="fst-italic text-muted">Приключена</span>`;
                    } else {
                        if (s.currentWarehouseId === 1) location = "Централен склад (София)";
                        if (s.currentWarehouseId === 2) location = "Склад Север (Варна)";
                        if (s.assignedCourierId) location = "При куриер";
                    }

                    let problemText = s.problemType ? `<span class="text-danger fw-bold"><i class="fas fa-exclamation-circle"></i> ${s.problemType}</span>` : '<span class="text-success fw-bold"><i class="fas fa-check"></i> ОК</span>';

                    let rowClass = s.problemType ? "table-danger" : "";

                    let creator = s.createdBy ? s.createdBy : "-";

                    const row = `
                        <tr class="${rowClass}">
                            <td class="fw-bold text-primary">${s.trackingNumber}</td>
                            <td class="fw-bold text-secondary">${creator}</td> 
                            <td><span class="badge ${bgStatus} fs-6 px-3 py-2 border border-dark shadow-sm">${displayStatus}</span></td>
                            <td class="fw-bold">${location}</td>
                            <td>${problemText}</td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });
            }

            document.getElementById('reportSection').style.display = 'block';
            document.getElementById('reportSection').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
