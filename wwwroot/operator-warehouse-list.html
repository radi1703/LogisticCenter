<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Наличност в склад</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/site.css">
    <style>
        body {
            background-color: #89CFF0;
        }
        
        /* Стил за контейнера на таблицата */
        .table-container {
            background: white;
            border: 3px solid black;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 6px 6px 0px black;
            margin-bottom: 40px;
        }

        .custom-table { width: 100%; border-collapse: collapse; text-align: center; }
        .custom-table th, .custom-table td { border: 2px solid black; padding: 12px; vertical-align: middle; }
        .custom-table th { background-color: #a4d4ea; font-size: 1.1rem; text-transform: uppercase; } 
        
        .custom-table tbody tr:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    
    <div class="custom-header d-flex justify-content-between align-items-center px-4" style="background-color: #ffc0cb; border-bottom: 3px solid black; padding: 15px 0;">
        <div class="fw-bold fs-5">
            <a href="operator-warehouse-menu.html" class="text-dark text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i> Назад към Складово Меню
            </a>
        </div>
        <div class="fs-5">
            <span class="me-4 fw-bold"><i class="fas fa-user-circle"></i> Здравей, <span id="operatorNameDisplay">Оператор</span></span>
            <a href="#" class="text-dark fw-bold text-decoration-underline" onclick="logout()">ИЗХОД</a>
        </div>
    </div>

    <div class="container mt-4">
        
        <div class="row mb-4 align-items-center justify-content-center bg-white p-3 shadow-sm" style="border: 3px solid black; border-radius: 15px; width: fit-content; margin: 0 auto;">
            <div class="col-auto">
                <h4 class="fw-bold mb-0"><i class="fas fa-warehouse text-primary me-2"></i> Изберете склад:</h4>
            </div>
            <div class="col-auto">
                <select id="warehouseSelect" class="form-select border-2 border-dark fw-bold fs-5 text-primary" style="width: 350px; box-shadow: 3px 3px 0px black; cursor: pointer;" onchange="loadShipments()">
                    <option value="1">Централен склад - София</option>
                    <option value="2">Склад Север - Варна</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <h4 class="fw-bold mb-4 border-bottom border-dark pb-2">
                <i class="fas fa-clipboard-list text-success me-2"></i> Пратки в: <span id="warehouseNameDisplay" class="text-primary">Централен склад - София</span>
            </h4>

            <div class="table-responsive">
                <table class="custom-table">
                    <thead>
                        <tr>
                            <th>Номер</th>
                            <th>Регистрирана от</th> <th>Получател, Адрес и Телефон</th>
                            <th>Тегло</th>
                            <th>Особености</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="custom-footer" style="background-color: #ffc0cb; border-top: 3px solid black; position: fixed; bottom: 0; width: 100%; height: 40px;"></div>

    <script>
        //Показваме името на логнатия оператор
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.username) {
            document.getElementById('operatorNameDisplay').innerText = user.username;
        } else {
            window.location.href = 'index.html'; 
        }

        //Функция за Изход
        function logout() { 
            localStorage.removeItem('user'); 
            window.location.href = 'index.html';
        }

        async function loadShipments() {
            const warehouseSelect = document.getElementById('warehouseSelect');
            const warehouseId = warehouseSelect.value;
            const warehouseName = warehouseSelect.options[warehouseSelect.selectedIndex].text;
            
            document.getElementById('warehouseNameDisplay').innerText = warehouseName;

            try {
                // Взимаме само пратките за този склад които НЕ СА доставени
                const response = await fetch(`/api/shipments/in-warehouse/${warehouseId}`);
                const data = await response.json();
                
                const tbody = document.getElementById('tableBody');
                tbody.innerHTML = ''; 

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="fst-italic text-muted fs-5 py-4"><i class="fas fa-box-open mb-2" style="font-size: 2rem;"></i><br>Няма налични пратки в този склад.</td></tr>`;
                    return;
                }

                data.forEach(shipment => {
                    
                    
                    let displayStatus = shipment.status; 
                    let bgStatus = "";

                    if (shipment.status === "In Warehouse" || shipment.status === "В склад") { 
                        displayStatus = "В склад"; 
                        bgStatus = "bg-light text-dark border"; 
                    } else if (shipment.status === "Registered" || shipment.status === "Регистрирана") {
                        displayStatus = "Регистрирана";
                        bgStatus = "bg-info text-dark";
                    } else if (shipment.status === "In Transit" || shipment.status === "В движение") { 
                        displayStatus = "В движение"; 
                        bgStatus = "bg-warning text-dark"; 
                    } else {
                        
                        bgStatus = "bg-secondary text-white";
                    }
                    

                    // Взимаме името на оператора 
                    let creator = shipment.createdBy ? shipment.createdBy : "-";

                    const row = `
                        <tr>
                            <td class="fw-bold text-primary fs-5">${shipment.trackingNumber}</td>
                            <td class="fw-bold text-secondary">${creator}</td>
                            <td class="text-start" style="line-height: 1.6;">
                                <strong><i class="fas fa-user text-muted"></i></strong> ${shipment.receiverName}<br>
                                <strong><i class="fas fa-map-marker-alt text-danger"></i></strong> ${shipment.receiverAddress || 'няма адрес'}<br>
                                <strong><i class="fas fa-phone text-success"></i></strong> ${shipment.receiverPhone || ''}
                            </td>
                            <td class="fw-bold">${shipment.weight ? shipment.weight + ' кг' : '-'}</td>
                            <td class="fst-italic text-muted">${shipment.note || 'няма'}</td>
                            <td><span class="badge ${bgStatus} fs-6 border border-dark px-3 py-2 shadow-sm">${displayStatus}</span></td>
                        </tr>
                    `;
                    tbody.innerHTML += row;
                });

            } catch (error) {
                console.error(error);
                alert("Грешка при връзката със сървъра.");
            }
        }

        
        loadShipments();
    </script>
</body>
</html>
