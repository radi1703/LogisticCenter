<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Меню Склад</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/site.css">
    <style>
        body {
            background-color: #89CFF0; 
        }
        
        /* Стил за работните карти */
        .operator-card {
            background: white;
            border: 3px solid black;
            border-radius: 15px;
            padding: 40px 20px;
            box-shadow: 6px 6px 0px black;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            height: 100%;
        }
        
        .operator-card:hover {
            transform: translateY(-5px);
            box-shadow: 8px 8px 0px black;
            background-color: #f8f9fa;
        }

        .icon-large {
            font-size: 5rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    
    <div class="custom-header d-flex justify-content-between align-items-center px-4" style="background-color: #ffc0cb; border-bottom: 3px solid black; padding: 15px 0;">
        <div class="fw-bold fs-5">
            <a href="dashboard-operator.html" class="text-dark text-decoration-none">
                <i class="fas fa-arrow-left me-2"></i> Назад към таблото
            </a>
        </div>
        <div class="fs-5">
            <span class="fw-bold"><i class="fas fa-user-circle"></i> <span id="operatorNameDisplay">Оператор</span></span>
        </div>
    </div>

    <div class="container mt-5 mb-5">
        
        <div class="text-center mb-5">
            <h1 class="fw-bold text-dark text-uppercase" style="text-shadow: 2px 2px 0px white;">
                <i class="fas fa-warehouse me-2"></i> Управление на складове
            </h1>
            <p class="fs-5 fw-bold text-dark mt-2">Избери действие от менюто по-долу</p>
        </div>
        
        <div class="row g-5 justify-content-center mt-2">
            
            <div class="col-md-5 col-sm-10">
                <div class="operator-card" onclick="window.location.href='operator-warehouse-add.html'">
                    <i class="fas fa-dolly icon-large text-primary"></i>
                    <h3 class="fw-bold">Въвеждане в склад</h3>
                    <p class="text-muted fw-bold mt-3 mb-0 fs-5">Приемане и зачисляване на нова пратка към складова база</p>
                </div>
            </div>

            <div class="col-md-5 col-sm-10">
                <div class="operator-card" onclick="window.location.href='operator-warehouse-list.html'">
                    <i class="fas fa-boxes icon-large text-success"></i>
                    <h3 class="fw-bold">Складови наличности</h3>
                    <p class="text-muted fw-bold mt-3 mb-0 fs-5">Справка за всички налични пратки по складове и локации</p>
                </div>
            </div>

        </div>

    </div>

    <div class="custom-footer" style="background-color: #ffc0cb; border-top: 3px solid black; position: fixed; bottom: 0; width: 100%; height: 40px;"></div>

    <script>
        // Взимаме името на логнатия оператор и го показваме горе вдясно
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.username) {
            document.getElementById('operatorNameDisplay').innerText = user.username;
        } else {
            window.location.href = 'index.html'; 
        }
    </script>
</body>
</html>
